<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshFold Laundry</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f8fafc;
  color: #0f172a;
}

header {
  background: #2563eb;
  color: white;
  padding: 60px 20px;
  text-align: center;
}

section {
  padding: 40px 20px;
  max-width: 900px;
  margin: auto;
}

.pricing {
  display: grid;
  gap: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

button {
  background: #2563eb;
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>
  <h1>FreshFold Laundry</h1>
  <p>Premium laundry service for busy households</p>
</header>

<section>
  <h2>How It Works</h2>
  <p>1. Schedule pickup → 2. We clean → 3. Delivered to your door</p>
</section>

<section>
  <h2>Pricing</h2>

  <div class="pricing">
    <div class="card">
      <h3>Pay Per Load</h3>
      <p>$25 per load</p>
    </div>

    <div class="card">
      <h3>Monthly Plan</h3>
      <p>$99/month (4 loads)</p>
    </div>
  </div>

</section>

<section>
  <h2>Book Now</h2>
  <button>Schedule Pickup</button>
</section>

</body>
</html>
